<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Plataforma</title>
    <!-- Tailwind CSS CDN para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS Client CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Tarjeta Principal -->
    <div class="w-full max-w-md bg-gray-800 p-6 rounded-xl shadow-xl border border-gray-700 text-center">
        <h1 class="text-2xl font-bold mb-2 text-indigo-400">Plataforma Exclusiva</h1>
        <p class="text-gray-400 text-sm mb-6">Conéctate para acceder a tu contenido</p>
        
        <!-- Sección de Inicio de Sesión -->
        <div id="login-section">
            <button id="login-btn" class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 flex items-center justify-center gap-2 shadow-md">
                <span>Continuar con Google</span>
            </button>
        </div>

        <!-- Panel de Usuario (Oculto por defecto hasta que inicie sesión) -->
        <div id="dashboard-section" class="hidden">
            <div id="user-info" class="mb-6 p-3 bg-gray-900 rounded-lg border border-gray-700 text-left">
                <!-- Aquí se inyectarán los datos del perfil -->
            </div>
            <button id="logout-btn" class="w-full bg-gray-700 hover:bg-gray-600 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
                Cerrar sesión
            </button>
        </div>
    </div>

    <script>
        // 1. TUS CREDENCIALES DE SUPABASE
        // (Copia la URL y la llave 'anon public' desde la configuración de tu proyecto en Supabase)
        const SUPABASE_URL = 'https://gpmwfssligylhgkhovqm.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Q6_jbSXgHmj72x6GUt1Abw_BJzWDbZb';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const userInfo = document.getElementById('user-info');

        // 2. Verificar si ya hay una sesión activa al cargar la página
        async function checkUser() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                showDashboard(session.user);
            } else {
                showLogin();
            }
        }

        // 3. Mostrar panel de control
        function showDashboard(user) {
            loginSection.classList.add('hidden');
            dashboardSection.classList.remove('hidden');
            userInfo.innerHTML = `
                <p class="text-xs text-indigo-400 font-semibold uppercase tracking-wider mb-1">Sesión Activa</p>
                <p class="text-sm text-gray-200 font-medium truncate">${user.email}</p>
                <p class="text-xs text-gray-400 mt-1">ID: ${user.id}</p>
            `;
        }

        // 4. Mostrar botón de login
        function showLogin() {
            loginSection.classList.remove('hidden');
            dashboardSection.classList.add('hidden');
        }

        // 5. Iniciar sesión con Google OAuth
        loginBtn.addEventListener('click', async () => {
            const { error } = await supabaseClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin
                }
            });
            if (error) {
                alert('Error al iniciar sesión: ' + error.message);
            }
        });

        // 6. Cerrar sesión
        logoutBtn.addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            showLogin();
        });

        // Ejecutar verificación al cargar
        checkUser();
    </script>
</body>
</html>
